<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1220" viewBox="0 0 1400 1220">
  <rect width="1400" height="1220" fill="#f6f8fb"/>
  <rect x="40" y="40" width="1320" height="1140" rx="24" fill="#ffffff" stroke="#23395b" stroke-width="4"/>
  <text x="80" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#23395b">Apriori Algorithm: Mathematical Explanation</text>
  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#4a5568">Used for frequent pattern discovery and association rule mining in the phishing dataset</text>

  <rect x="80" y="190" width="1240" height="100" rx="16" fill="#edf5ff" stroke="#4b88c8" stroke-width="2.5"/>
  <text x="110" y="230" font-family="Consolas, monospace" font-size="24" fill="#1d3557">Items: feature=value pairs such as SSLfinal_State=-1, URL_of_Anchor=-1, Result=-1</text>
  <text x="110" y="265" font-family="Consolas, monospace" font-size="24" fill="#1d3557">Transaction: one website record converted into a set of items</text>

  <rect x="80" y="330" width="590" height="240" rx="16" fill="#eefaf1" stroke="#3f8f59" stroke-width="2.5"/>
  <text x="110" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#245c35">Support</text>
  <text x="110" y="420" font-family="Consolas, monospace" font-size="24" fill="#22313f">support(X) = |{T in D : X ⊆ T}| / |D|</text>
  <text x="110" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Measures how frequently itemset X appears in the database.</text>
  <text x="110" y="505" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Example: support(URL_of_Anchor=-1)</text>
  <text x="110" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">= transactions containing URL_of_Anchor=-1 / total transactions</text>

  <rect x="730" y="330" width="590" height="240" rx="16" fill="#fff6e9" stroke="#c78a2b" stroke-width="2.5"/>
  <text x="760" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#8a5200">Confidence</text>
  <text x="760" y="420" font-family="Consolas, monospace" font-size="24" fill="#22313f">confidence(X ⇒ Y) = support(X ∪ Y) / support(X)</text>
  <text x="760" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Measures how often Y is true when X is true.</text>
  <text x="760" y="505" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Equivalent to conditional probability P(Y | X).</text>

  <rect x="80" y="610" width="590" height="240" rx="16" fill="#f7eefc" stroke="#8e5ad7" stroke-width="2.5"/>
  <text x="110" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#5e3b8a">Lift</text>
  <text x="110" y="700" font-family="Consolas, monospace" font-size="24" fill="#22313f">lift(X ⇒ Y) = confidence(X ⇒ Y) / support(Y)</text>
  <text x="110" y="740" font-family="Consolas, monospace" font-size="24" fill="#22313f">= support(X ∪ Y) / (support(X) × support(Y))</text>
  <text x="110" y="785" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Interpretation: lift &gt; 1 means a positive association.</text>

  <rect x="730" y="610" width="590" height="240" rx="16" fill="#eef7fb" stroke="#3b82a0" stroke-width="2.5"/>
  <text x="760" y="655" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#27566b">Leverage</text>
  <text x="760" y="700" font-family="Consolas, monospace" font-size="24" fill="#22313f">leverage(X ⇒ Y) = support(X ∪ Y) - support(X) × support(Y)</text>
  <text x="760" y="745" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Measures how much observed co-occurrence exceeds expected co-occurrence.</text>

  <rect x="80" y="890" width="590" height="190" rx="16" fill="#fef0f0" stroke="#c85c5c" stroke-width="2.5"/>
  <text x="110" y="935" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#8b2d2d">Conviction</text>
  <text x="110" y="980" font-family="Consolas, monospace" font-size="24" fill="#22313f">conviction(X ⇒ Y) = (1 - support(Y)) / (1 - confidence(X ⇒ Y))</text>
  <text x="110" y="1020" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">Higher conviction means a stronger implication from X to Y.</text>

  <rect x="730" y="890" width="590" height="190" rx="16" fill="#f2fbe9" stroke="#7ca440" stroke-width="2.5"/>
  <text x="760" y="935" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#56752c">Apriori Principle</text>
  <text x="760" y="980" font-family="Consolas, monospace" font-size="24" fill="#22313f">If an itemset is frequent, all of its non-empty subsets are frequent.</text>
  <text x="760" y="1020" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#22313f">This property allows pruning of infrequent candidates and reduces computation.</text>

  <text x="80" y="1135" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#22313f">Example rule from this project: URL_of_Anchor=-1 ⇒ Result=-1 with high confidence and lift, showing a strong phishing indicator.</text>
</svg>
